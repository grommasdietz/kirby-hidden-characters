name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.2"
            full-suite: false
          - php-version: "8.3"
            full-suite: true
          - php-version: "8.4"
            full-suite: true
          - php-version: "8.5"
            full-suite: true
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, dom, gd, json, mbstring, simplexml
          coverage: none
          tools: composer:v2
      - name: Install playground dependencies
        run: composer install -d playground --prefer-dist --no-progress --no-interaction
      - name: Verify minimum runtime
        run: composer test:smoke
      - name: Install root development dependencies
        if: matrix.full-suite
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Validate Composer metadata
        if: matrix.php-version == '8.3'
        run: composer validate --strict --no-check-version
      - name: Check platform requirements
        if: matrix.php-version == '8.3'
        run: composer check-platform-reqs
      - name: Lint PHP
        if: matrix.php-version == '8.3'
        run: composer lint
      - name: Static analysis
        if: matrix.php-version == '8.3'
        run: composer psalm -- --show-info=false --output-format=github --no-cache
      - name: Verify third-party notices
        if: matrix.php-version == '8.3'
        run: |
          composer notices:generate
          git diff --exit-code -- THIRD_PARTY_NOTICES.md
      - name: Check release readiness
        if: matrix.php-version == '8.3'
        run: composer release:check
      - name: Run PHPUnit suites
        if: matrix.full-suite
        run: composer test:unit && composer test:integration

  node:
    name: Node quality, assets and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - name: Lint JavaScript
        run: pnpm lint
      - name: Verify generated assets
        run: pnpm build:check
      - name: Verify Panel bundle
        run: pnpm test:bundle

      - name: Verify character assets
        run: pnpm test:assets
      - name: Verify source archive
        run: pnpm test:archive
      - name: Verify documentation
        run: pnpm docs:verify
      - name: Check repository hygiene
        run: pnpm test:hygiene

  browser:
    name: Browser tests
    runs-on: ubuntu-latest
    needs: [php, node]
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: curl, dom, gd, json, mbstring, simplexml
          coverage: none
          tools: composer:v2
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v6
      - name: Install playground PHP dependencies
        run: composer install -d playground --prefer-dist --no-progress --no-interaction
      - name: Install root PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:check
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm test:browser
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: kirby-hidden-characters-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 3

  release:
    name: Semantic release
    runs-on: ubuntu-latest
    needs: [php, node, browser]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Create release app token
        id: release-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GD_RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.GD_RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.release-token.outputs.token }}
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2
      - uses: actions/setup-node@v7
        with:
          node-version-file: .node-version
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - name: Run Semantic Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
          HUSKY: 0
