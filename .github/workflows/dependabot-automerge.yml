name: Dependabot Automerge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Enable automerge for patch updates
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        # Keep the maintained v2 line instead of SHA-pinning:
        # this job does not checkout or execute pull request code.
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable automerge
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"

      - name: Keep non-patch updates manual
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-patch' }}
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          echo "Skipping automerge for Dependabot update type: ${UPDATE_TYPE:-unknown}"
